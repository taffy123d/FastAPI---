{% extends "base.html" %}

{% block title %}{% if is_edit %}编辑图书{% else %}新增图书{% endif %}{% endblock %}

{% block content %}
<div class="form-card">
    <h2>{% if is_edit %}编辑图书{% else %}新增图书{% endif %}</h2>
    
    <form id="bookForm">
        <div class="form-group">
            <label for="title">书名 *</label>
            <input type="text" id="title" name="title" required 
                   value="{{ book.title if book else '' }}">
        </div>

        <div class="form-group">
            <label for="author">作者 *</label>
            <input type="text" id="author" name="author" required
                   value="{{ book.author if book else '' }}">
        </div>

        <div class="form-group">
            <label for="price">价格 *</label>
            <input type="number" id="price" name="price" step="0.01" required
                   value="{{ book.price if book else '' }}">
        </div>

        <div class="form-group">
            <label for="description">简介</label>
            <textarea id="description" name="description" rows="4">{{ book.description if book and book.description else '' }}</textarea>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn primary-btn">
                {% if is_edit %}保存修改{% else %}创建图书{% endif %}
            </button>
            <a href="/book-list" class="btn secondary-btn">返回列表</a>
        </div>
    </form>
</div>

<script>
    // 获取表单元素
    const form = document.getElementById('bookForm');
    const isEdit = {{ is_edit | tojson }};
    const bookId = {{ book.id if book else 'null' }};

    // 监听表单提交
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); // 阻止默认表单跳转

        // 收集表单数据
        const formData = {
            title: document.getElementById('title').value,
            author: document.getElementById('author').value,
            price: parseFloat(document.getElementById('price').value),
            description: document.getElementById('description').value || null
        };

        try {
            let url = '/api/v1/books/';
            let method = 'POST';

            // 如果是编辑模式，修改 URL 和 Method
            if (isEdit) {
                url = `/api/v1/books/${bookId}`;
                method = 'PUT';
            }

            // 调用后端 API
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                alert(isEdit ? '修改成功！' : '创建成功！');
                window.location.href = '/book-list'; // 跳回列表页
            } else {
                const error = await response.json();
                alert('操作失败：' + (error.detail || '未知错误'));
            }
        } catch (err) {
            console.error(err);
            alert('网络错误，请稍后重试');
        }
    });
</script>
{% endblock %}
